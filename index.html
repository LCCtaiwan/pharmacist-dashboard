<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藥師海巡 — 衛教介入儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#1a3a5c;--navy2:#234e7a;--white:#fff;
  --red:#c0392b;--amber:#e67e22;--teal:#16a085;--gray:#6c757d;
  --bg:#f4f7fb;--card:#fff;--border:#dde3ec;
  --gap:16px;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:#222;font-size:14px}
.wrap{max-width:1300px;margin:0 auto;padding:var(--gap)}
/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:20px 24px;border-radius:var(--r);margin-bottom:var(--gap);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:.5px}
.hdr .sub{font-size:12px;opacity:.75;margin-top:2px}
/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:6px 10px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.12);color:#fff;font-size:13px;outline:none}
.filters select option{color:#222;background:#fff}
.filters input::placeholder{color:rgba(255,255,255,.6)}
.btn-reset{padding:6px 14px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:6px;color:#fff;cursor:pointer;font-size:13px}
.btn-reset:hover{background:rgba(255,255,255,.3)}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:var(--gap);margin-bottom:var(--gap)}
.kpi{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--navy)}
.kpi.red{border-color:var(--red)}
.kpi.amber{border-color:var(--amber)}
.kpi.teal{border-color:var(--teal)}
.kpi.gray{border-color:var(--gray)}
.kpi-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-val{font-size:30px;font-weight:700;color:var(--navy)}
.kpi.red .kpi-val{color:var(--red)}
.kpi.amber .kpi-val{color:var(--amber)}
.kpi.teal .kpi-val{color:var(--teal)}
/* CHARTS */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:var(--gap)}
@media(max-width:700px){.chart-row{grid-template-columns:1fr}}
.chart-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.chart-card h3{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:14px;text-transform:uppercase;letter-spacing:.4px}
.chart-wrap{position:relative;height:220px}
/* TABLE */
.tbl-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:var(--gap)}
.tbl-card h3{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:14px;text-transform:uppercase;letter-spacing:.4px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:#fff;padding:9px 12px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:var(--navy2)}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;max-width:280px}
tr:hover td{background:#f0f4f9}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-A{background:#fde8e8;color:#c0392b}
.badge-B{background:#fdf0e0;color:#d35400}
.badge-C{background:#fefae0;color:#b7770d}
.badge-D{background:#e4f9f0;color:#16a085}
.badge-X{background:#f0f0f0;color:#6c757d}
.badge-高{background:#fde8e8;color:#c0392b}
.badge-中{background:#fdf0e0;color:#d35400}
.badge-低{background:#f0f0f0;color:#6c757d}
.txt-clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
a{color:var(--navy2);text-decoration:none}
a:hover{text-decoration:underline}
.count-badge{font-size:11px;background:var(--navy);color:#fff;padding:1px 7px;border-radius:8px;margin-left:8px;vertical-align:middle}
.footer{text-align:center;color:var(--gray);font-size:12px;padding:12px 0}
</style>
</head>
<body>
<div class="wrap">

<header class="hdr">
  <div>
    <div class="h1" style="font-size:20px;font-weight:700">💊 藥師海巡 — 衛教介入儀表板</div>
    <div class="sub" id="sub-title">載入中…</div>
  </div>
  <div class="filters">
    <select id="f-cat" onchange="app.filter()">
      <option value="">全部類別</option>
      <option value="A">A — 錯誤用藥觀念</option>
      <option value="B">B — 詢問藥品問題</option>
      <option value="C">C — 高傳播衛教機會</option>
      <option value="D">D — 形象正面切入</option>
      <option value="X">X — 不介入</option>
    </select>
    <select id="f-pri" onchange="app.filter()">
      <option value="">全部優先度</option>
      <option value="高">高</option>
      <option value="中">中</option>
      <option value="低">低</option>
    </select>
    <input type="text" id="f-kw" placeholder="搜尋內文 / 作者…" oninput="app.filter()" style="width:180px">
    <button class="btn-reset" onclick="app.reset()">重置</button>
  </div>
</header>

<div class="kpi-row">
  <div class="kpi"><div class="kpi-label">總貼文數</div><div class="kpi-val" id="k-total">—</div></div>
  <div class="kpi red"><div class="kpi-label">A 錯誤用藥觀念</div><div class="kpi-val" id="k-a">—</div></div>
  <div class="kpi amber"><div class="kpi-label">B 詢問藥品問題</div><div class="kpi-val" id="k-b">—</div></div>
  <div class="kpi teal"><div class="kpi-label">C 高傳播機會</div><div class="kpi-val" id="k-c">—</div></div>
  <div class="kpi"><div class="kpi-label">高優先介入</div><div class="kpi-val" id="k-high">—</div></div>
  <div class="kpi gray"><div class="kpi-label">平均信心分數</div><div class="kpi-val" id="k-conf">—</div></div>
</div>

<div class="chart-row">
  <div class="chart-card">
    <h3>介入類別分布</h3>
    <div class="chart-wrap"><canvas id="chart-cat"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>優先順序分布</h3>
    <div class="chart-wrap"><canvas id="chart-pri"></canvas></div>
  </div>
</div>

<div class="tbl-card">
  <h3>貼文清單 <span class="count-badge" id="tbl-count">0</span></h3>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="app.sort('作者')">作者</th>
          <th onclick="app.sort('內文')">內文摘要</th>
          <th onclick="app.sort('愛心數')">愛心</th>
          <th onclick="app.sort('留言數')">留言</th>
          <th onclick="app.sort('介入類別')">類別</th>
          <th onclick="app.sort('優先順序')">優先</th>
          <th onclick="app.sort('信心分數')">信心</th>
          <th>核心問題</th>
          <th>建議留言</th>
        </tr>
      </thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
</div>

<div class="footer" id="footer-date"></div>
</div>

const PRIORITY_ORDER = {高:0,中:1,低:2};
const CAT_LABEL = {A:"A",B:"B",C:"C",D:"D",X:"X"};

const app = (() => {
  let filtered = [...ALL_DATA];
  let sortCol = "優先順序", sortDir = 1;
  let chartCat, chartPri;

  function init(){
    filtered = [...ALL_DATA];
    renderTable();
    updateKPIs();
    try { buildCharts(); } catch (e) { console.warn("Chart init failed:", e); }
    updateCharts();
    document.getElementById("footer-date").textContent =
      "資料更新：" + new Date().toLocaleDateString("zh-TW");
    const total = ALL_DATA.length;
    document.getElementById("sub-title").textContent =
      `共 ${total} 筆貼文`;
  }

  function buildCharts(){
    if (typeof Chart === "undefined") return;
    const cats = ["A","B","C","D","X"];
    const catCounts = cats.map(c => ALL_DATA.filter(r=>r.介入類別===c).length);
    const catColors = ["#c0392b","#e67e22","#f1c40f","#16a085","#bdc3c7"];

    const ctx1 = document.getElementById("chart-cat").getContext("2d");
    chartCat = new Chart(ctx1,{type:"doughnut",data:{
      labels:["A 錯誤用藥","B 詢問藥品","C 高傳播","D 正面形象","X 不介入"],
      datasets:[{data:catCounts,backgroundColor:catColors,borderWidth:2,borderColor:"#fff"}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:"60%",
      plugins:{legend:{position:"right",labels:{font:{size:12},padding:10}}}}});

    const pris = ["高","中","低"];
    const priCounts = pris.map(p => ALL_DATA.filter(r=>r.優先順序===p).length);
    const priColors = ["#c0392b","#e67e22","#6c757d"];
    const ctx2 = document.getElementById("chart-pri").getContext("2d");
    chartPri = new Chart(ctx2,{type:"bar",data:{
      labels:pris,
      datasets:[{label:"筆數",data:priCounts,backgroundColor:priColors,borderRadius:6}]
    },options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1}},x:{grid:{display:false}}}}});
  }

  function updateCharts(){
    if(!chartCat || !chartPri) return;
    const cats = ["A","B","C","D","X"];
    chartCat.data.datasets[0].data = cats.map(c=>filtered.filter(r=>r.介入類別===c).length);
    chartCat.update("none");
    const pris = ["高","中","低"];
    chartPri.data.datasets[0].data = pris.map(p=>filtered.filter(r=>r.優先順序===p).length);
    chartPri.update("none");
  }

  function updateKPIs(){
    const d = filtered;
    document.getElementById("k-total").textContent = d.length;
    document.getElementById("k-a").textContent = d.filter(r=>r.介入類別==="A").length;
    document.getElementById("k-b").textContent = d.filter(r=>r.介入類別==="B").length;
    document.getElementById("k-c").textContent = d.filter(r=>r.介入類別==="C").length;
    document.getElementById("k-high").textContent = d.filter(r=>r.優先順序==="高").length;
    const confs = d.map(r=>r.信心分數).filter(Boolean);
    const avg = confs.length ? (confs.reduce((a,b)=>a+b,0)/confs.length).toFixed(1) : "—";
    document.getElementById("k-conf").textContent = avg;
  }

  function renderTable(){
    const sorted = [...filtered].sort((a,b)=>{
      const av=a[sortCol], bv=b[sortCol];
      if(sortCol==="優先順序") return sortDir*(PRIORITY_ORDER[av]||9) - sortDir*(PRIORITY_ORDER[bv]||9);
      if(typeof av==="number") return sortDir*(av-bv);
      return sortDir*String(av||"").localeCompare(String(bv||""),"zh-TW");
    });
    document.getElementById("tbl-count").textContent = sorted.length;
    const rows = sorted.map(r=>`
      <tr>
        <td><a href="${r.貼文連結}" target="_blank">${esc(r.作者)}</a></td>
        <td><div class="txt-clamp">${esc(r.內文)}</div></td>
        <td style="text-align:center">${r.愛心數}</td>
        <td style="text-align:center">${r.留言數}</td>
        <td><span class="badge badge-${r.介入類別}">${r.介入類別}</span></td>
        <td><span class="badge badge-${r.優先順序}">${r.優先順序}</span></td>
        <td style="text-align:center">${r.信心分數}</td>
        <td><div class="txt-clamp">${esc(r.核心問題)}</div></td>
        <td><div class="txt-clamp">${esc(r.建議留言草稿)}</div></td>
      </tr>`).join("");
    document.getElementById("tbl-body").innerHTML = rows;
  }

  function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }

  function render(){
    updateKPIs();
    renderTable();
    updateCharts();
  }

  function filter(){
    const cat = document.getElementById("f-cat").value;
    const pri = document.getElementById("f-pri").value;
    const kw  = document.getElementById("f-kw").value.trim().toLowerCase();
    filtered = ALL_DATA.filter(r=>{
      if(cat && r.介入類別!==cat) return false;
      if(pri && r.優先順序!==pri) return false;
      if(kw && !r.內文.toLowerCase().includes(kw) && !r.作者.toLowerCase().includes(kw) && !r.核心問題.toLowerCase().includes(kw)) return false;
      return true;
    });
    render();
  }

  function reset(){
    document.getElementById("f-cat").value="";
    document.getElementById("f-pri").value="";
    document.getElementById("f-kw").value="";
    filtered=[...ALL_DATA]; render();
  }

  function sort(col){
    if(sortCol===col) sortDir*=-1;
    else { sortCol=col; sortDir=1; }
    renderTable();
  }

  return {init,filter,reset,sort};
})();

window.app = app;
window.addEventListener("DOMContentLoaded", app.init);
</script>
